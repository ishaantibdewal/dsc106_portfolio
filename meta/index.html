<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codebase Meta</title>
  <script>
    document.documentElement.style.setProperty("color-scheme", localStorage.colorScheme || "light");
  </script>
  <link rel="stylesheet" href="../style.css">
</head>

<body>
  <h1>Codebase Meta</h1>
  <p>
    This page will show statistics and visualizations about the code behind this portfolio,
    including patterns in files, commits, and project structure.
  </p>
  <div id="stats"></div>

  <h2>Commits by time of day</h2>
  <div id="chart"></div>
  <p id="selection-count">No commits selected</p>
  <dl id="language-breakdown" class="stats"></dl>
  <dl id="commit-tooltip" class="info tooltip" hidden>
    <dt>Commit</dt>
    <dd>
      <a href="" id="commit-link" target="_blank" rel="noopener noreferrer"></a>
    </dd>

    <dt>Date</dt>
    <dd id="commit-date"></dd>

    <dt>Time</dt>
    <dd id="commit-time"></dd>

    <dt>Author</dt>
    <dd id="commit-author"></dd>

    <dt>Lines edited</dt>
    <dd id="commit-lines"></dd>
  </dl>

  <script src="../global.js" type="module"></script>
  <script src="main.js" type="module"></script>
</body>
</html>
